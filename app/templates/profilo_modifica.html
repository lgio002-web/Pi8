{% extends "base.html" %}
{% block title %}Modifica Profilo - ASD Pi8 Running{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-4">
        <a href="{{ url_for('atleta.profilo') }}" class="text-pi8-blue hover:underline text-sm">← Torna al profilo</a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-pi8-yellow">
        <h1 class="text-2xl font-bold text-pi8-blue mb-6">✏️ Modifica Profilo</h1>

        <form method="POST" action="{{ url_for('atleta.modifica_profilo') }}" enctype="multipart/form-data" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" name="email" required
                       value="{{ current_user.email }}"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
            </div>

            <div>
                <label for="taglia_maglia" class="block text-sm font-medium text-gray-700 mb-1">Taglia Maglia</label>
                <select id="taglia_maglia" name="taglia_maglia"
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
                    <option value="">Seleziona...</option>
                    {% for taglia in ['XS', 'S', 'M', 'L', 'XL', 'XXL'] %}
                    <option value="{{ taglia }}" {% if current_user.taglia_maglia == taglia %}selected{% endif %}>{{ taglia }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="foto" class="block text-sm font-medium text-gray-700 mb-1">Foto Profilo</label>
                <input type="file" id="foto" name="foto" accept="image/*"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
                <p class="text-xs text-gray-400 mt-1">Formati: JPG, PNG, GIF, WebP. Max 2MB.</p>
            </div>

            <button type="submit"
                    class="w-full bg-pi8-blue text-white py-3 rounded-lg font-medium hover:bg-pi8-blue-dark transition shadow-md">
                Salva Modifiche
            </button>
        </form>
    </div>
</div>
{% endblock %}
