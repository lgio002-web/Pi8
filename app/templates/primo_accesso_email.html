{% extends "base.html" %}
{% block title %}Inserisci Email - ASD Pi8 Running{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-green-400">
        <div class="text-center mb-8">
            <div class="text-4xl mb-3">✅</div>
            <h1 class="text-2xl font-bold text-green-700">Dati Verificati!</h1>
            <p class="text-gray-500 mt-2">Inserisci la tua email per completare la registrazione</p>
        </div>

        <form method="POST" action="{{ url_for('auth.primo_accesso_conferma') }}" class="space-y-5">
            <input type="hidden" name="tessera" value="{{ tessera }}">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Indirizzo Email</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent transition"
                       placeholder="la.tua@email.com">
                <p class="text-xs text-gray-400 mt-1">Riceverai la password provvisoria a questo indirizzo</p>
            </div>

            <button type="submit"
                    class="w-full bg-pi8-blue text-white py-3 rounded-lg font-medium hover:bg-pi8-blue-dark transition shadow-md">
                Completa Registrazione
            </button>
        </form>
    </div>
</div>
{% endblock %}
