{% extends "base.html" %}
{% block title %}Cambia Password - ASD Pi8 Running{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-4">
        <a href="{{ url_for('atleta.profilo') }}" class="text-pi8-blue hover:underline text-sm">← Torna al profilo</a>
    </div>

    <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-pi8-yellow">
        <h1 class="text-2xl font-bold text-pi8-blue mb-6">🔒 Cambia Password</h1>

        <form method="POST" action="{{ url_for('atleta.cambia_password') }}" class="space-y-5">
            <div>
                <label for="password_attuale" class="block text-sm font-medium text-gray-700 mb-1">Password Attuale</label>
                <input type="password" id="password_attuale" name="password_attuale" required
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
            </div>

            <div>
                <label for="nuova_password" class="block text-sm font-medium text-gray-700 mb-1">Nuova Password</label>
                <input type="password" id="nuova_password" name="nuova_password" required minlength="6"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
                <p class="text-xs text-gray-400 mt-1">Almeno 6 caratteri</p>
            </div>

            <div>
                <label for="conferma_password" class="block text-sm font-medium text-gray-700 mb-1">Conferma Nuova Password</label>
                <input type="password" id="conferma_password" name="conferma_password" required minlength="6"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pi8-blue focus:border-transparent">
            </div>

            <button type="submit"
                    class="w-full bg-pi8-blue text-white py-3 rounded-lg font-medium hover:bg-pi8-blue-dark transition shadow-md">
                Cambia Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
